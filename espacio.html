<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo de Flores Amarillas</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: #000;
        }

        #escena-pony {
            position: relative;
            width: 100vw; height: 56.25vw;
            max-width: 1920px; max-height: 1080px;
            overflow: hidden;
            background-image: url('atardecer_ponis.png'); 
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        /* --- CUADRO DE TEXTO --- */
        .flowers_love {
            width: 450px; 
            position: absolute;
            left: 30px; 
            top: 25%; /* Un poco más abajo */
            padding: 20px;
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 15px;
            backdrop-filter: blur(5px); 
            border: 1px solid rgba(255, 241, 118, 0.3);
            font-size: 24px;
            text-align: center;
            font-family: "Flower", 'Comic Sans MS', cursive;
            line-height: 1.4;
            z-index: 100;
        }

        .flowers_love span.resaltado { color: #fff176; font-weight: bold; }
        .flowers_love p { margin: 0; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* --- BOTÓN DE MÚSICA (Esquina superior) --- */
        #btn-musica {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(255, 241, 118, 0.7);
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        /* --- ANIMACIÓN DE FLORES --- */
        @keyframes caer {
            0% { transform: translateY(-100px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(50vh) translateX(20px) rotate(180deg); }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(-20px) rotate(360deg); opacity: 0; }
        }

        .flor-amarilla {
            position: absolute;
            width: 18px; height: 18px;
            background-color: #fff176;
            border-radius: 50%;
            animation: caer linear infinite;
        }

        .flor-imagen {
            position: absolute;
            width: 45px; height: 45px; 
            background-image: url('flor_personalizada.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            animation: caer linear infinite;
        }

        /* Tiempos de las flores */
        .f1 { left: 10%; animation-duration: 7s; }
        .f2 { left: 30%; animation-duration: 10s; animation-delay: 2s; }
        .f3 { left: 50%; animation-duration: 8s; animation-delay: 4s; }
        .f4 { left: 70%; animation-duration: 12s; }
        .f5 { left: 90%; animation-duration: 9s; animation-delay: 1s; }
        .f6 { left: 20%; animation-duration: 11s; animation-delay: 3s; }
        .f7 { left: 40%; animation-duration: 14s; }
        .f8 { left: 60%; animation-duration: 10s; animation-delay: 5s; }
        .f9 { left: 80%; animation-duration: 13s; animation-delay: 2s; }
        .f10 { left: 15%; animation-duration: 15s; }

    </style>
</head>
<body>

    <div id="escena-pony">
        
        <button id="btn-musica" onclick="toggleMusica()">🎵 Play Música</button>

        <audio id="miMusica" loop>
            <source src="musica.mp3" type="audio/mpeg">
            Tu navegador no soporta el audio.
        </audio>

        <div class="flowers_love">
            <p>WENAS, perdón por tardarme mucho, pero aquí tienes mis <span class="resaltado">flores amarillas</span> atrasadas...</p>
            <p style="font-size: 18px; margin-top: 15px; opacity: 0.9;">
                Quería decirte que puede que no juguemos como antes o no hablemos como antes, pero <span class="resaltado">siempre serás alguien especial</span>.
            </p>
        </div>

        <div class="lluvia-flores">
            <div class="flor-amarilla f1"></div>
            <div class="flor-amarilla f2"></div>
            <div class="flor-amarilla f3"></div>
            <div class="flor-amarilla f4"></div>
            <div class="flor-amarilla f5"></div>
            <div class="flor-imagen f6"></div>
            <div class="flor-imagen f7"></div>
            <div class="flor-imagen f8"></div>
            <div class="flor-imagen f9"></div>
            <div class="flor-imagen f10"></div>
        </div>
    </div>

    <script>
        function toggleMusica() {
            var audio = document.getElementById("miMusica");
            var btn = document.getElementById("btn-musica");
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "🔇 Pausar";
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Música";
            }
        }
    </script>

</body>
</html>
